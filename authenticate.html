<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Access | CMS</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="./style/style.css" />
  </head>
  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
      <div class="container">
        <a class="navbar-brand" href="./index.html">CMS</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="./index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="./about.html">About</a></li>
            <li class="nav-item">
              <a class="nav-link" href="./authenticate.html">User Portal</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Signup container -->
    <div class="auth-container" id="signup" style="display: none">
      <h1 class="form-title">Register</h1>
      <form onsubmit="registerStudent(event)">
        <div id="signUpMessage" class="messageDiv" style="display: none"></div>
        
        <div class="input-group-auth">
          <label for="fName">Full Name</label>
          <i class="fas fa-user"></i>
          <input type="text" id="fName" placeholder="Enter Full Name" required name="fullName" />
        </div>

        <div class="input-group-auth">
          <label for="matricNo">Matric No</label>
          <i class="fas fa-id-card"></i>
          <input type="text" id="matricNo" placeholder="Enter Matric No" required name="matricNo" />
        </div>

        <div class="input-group-auth">
          <label for="rEmail">Email Address</label>
          <i class="fas fa-envelope"></i>
          <input type="email" id="rEmail" placeholder="Enter Email" required name="email" />
        </div>

        <div class="input-group-auth">
          <label for="password">Password</label>
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Enter Password" required name="password" />
          <i class="fas fa-eye password-toggle" onclick="togglePassword('password', this)"></i>
        </div>

        <div class="input-group-auth">
          <label for="cPassword">Confirm Password</label>
          <i class="fas fa-lock"></i>
          <input type="password" id="cPassword" placeholder="Confirm Password" required name="confirmPassword" />
          <i class="fas fa-eye password-toggle" onclick="togglePassword('cPassword', this)"></i>
        </div>

        <button class="btn btn-univ w-100 mt-3" type="submit" id="submitSignUp">Sign Up</button>
      </form>
      <div class="text-center mt-4">
        <p class="mb-1">Already Have Account?</p>
        <button id="signInButton" class="btn btn-link text-decoration-none fw-bold p-0">Sign In</button>
      </div>
    </div>

    <!-- Signin container -->
    <div class="auth-container" id="signIn">
      <h1 class="form-title">Sign In</h1>
      <form onsubmit="studentLogin(event)">
        <div id="signInMessage" class="messageDiv" style="display: none"></div>
        
        <div class="input-group-auth">
          <label for="email">Email Address</label>
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="Enter Email" name="email" required />
        </div>

        <div class="input-group-auth">
          <label for="loginPassword">Password</label>
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="Enter Password" required name="password" />
          <i class="fas fa-eye password-toggle" onclick="togglePassword('loginPassword', this)"></i>
        </div>

        <div class="text-end mb-3">
          <a href="#" class="text-decoration-none small" style="color: var(--color-primary);">Recover Password</a>
        </div>
        
        <button class="btn btn-univ w-100" type="submit" id="submitSignIn">Sign In</button>
      </form>
      <div class="text-center mt-4">
        <p class="mb-1">Don't have account yet?</p>
        <button id="signUpButton" class="btn btn-link text-decoration-none fw-bold p-0">Sign Up</button>
      </div>
    </div>

    <script src="./scripts/api.js"></script>
    <script src="./scripts/script.js"></script>
    <script src="./scripts/authetication.js"></script>
  </body>
</html>
